<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPRK: Urban Districts RP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        
        /* Интерфейс HUD */
        #hud { position: absolute; top: 15px; left: 15px; color: #fff; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px #000; }
        .status-pill { background: rgba(231, 76, 60, 0.8); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* Кнопка телефона */
        #phone-btn { 
            position: absolute; bottom: 25px; right: 25px; width: 75px; height: 75px; 
            background: radial-gradient(circle, #e74c3c, #c0392b); border-radius: 50%; 
            border: 3px solid #fff; z-index: 20; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        /* Обновленный телефон */
        #phone { 
            position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 75%; background: #0f0f0f; border-radius: 40px 40px 0 0; 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 30; padding: 25px; 
            color: #fff; border: 2px solid #2c3e50; box-sizing: border-box;
        }
        #phone.active { bottom: 0; }
        
        .phone-header { text-align: center; margin-bottom: 20px; color: #7f8c8d; font-size: 12px; letter-spacing: 2px; }
        
        /* Сетка приложений 3х3 */
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .app-item { 
            background: #1c1c1c; border: 1px solid #333; padding: 15px 5px; 
            border-radius: 18px; display: flex; flex-direction: column; 
            align-items: center; font-size: 10px; font-weight: bold; color: #ecf0f1;
        }
        .app-icon { font-size: 24px; margin-bottom: 8px; }
        
        #display-screen { 
            margin-top: 20px; background: #050505; height: 100px; border-radius: 15px; 
            padding: 12px; border: 1px solid #222; font-family: monospace; font-size: 11px; 
            color: #2ecc71; overflow-y: auto;
        }

        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; z-index: 20; }
    </style>
</head>
<body>

    <div id="hud">
        <span class="status-pill">СОНБУН: 100%</span>
        <div style="margin-top: 8px; font-size: 18px;"><b>ПХЕНЬЯН: РЕГИОН-1</b></div>
    </div>

    <div id="joystick-zone"></div>
    <div id="phone-btn" onclick="togglePhone()">📱</div>

    <div id="phone">
        <div class="phone-header">ПХЕНЬЯН ТЕЛЕКОМ • 5G-DPRK</div>
        <div class="app-grid">
            <div class="app-item" onclick="app('guns')"><span class="app-icon">🔫</span>АРСЕНАЛ</div>
            <div class="app-item" onclick="app('contacts')"><span class="app-icon">👥</span>КОНТАКТЫ</div>
            <div class="app-item" onclick="app('chat')"><span class="app-icon">💬</span>КЫМСУСАН</div>
            <div class="app-item" onclick="app('garage')"><span class="app-icon">🚗</span>ГАРАЖ</div>
            <div class="app-item" onclick="app('maps')"><span class="app-icon">🗺️</span>КАРТЫ</div>
            <div class="app-item" onclick="app('bank')"><span class="app-icon">🏦</span>БАНК</div>
        </div>
        <div id="display-screen">
            > Система инициализирована...<br>
            > Добро пожаловать, гражданин.
        </div>
        <button onclick="togglePhone()" style="width:100%; margin-top:20px; background:#c0392b; border:none; color:white; padding:12px; border-radius:15px; font-weight:bold;">СВЕРНУТЬ</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. МИР ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        scene.fog = new THREE.Fog(0x2c3e50, 30, 250);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        // --- 2. ГОРОДСКАЯ ИНФРАСТРУКТУРА ---
        const CITY_LIMIT = 600;

        // Основа земли (трава/земля)
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(CITY_LIMIT, CITY_LIMIT), new THREE.MeshPhongMaterial({color: 0x1e272e}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        function createDistrict(xOffset, zOffset) {
            const group = new THREE.Group();
            
            // Проезжая часть (Асфальт)
            const road = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshPhongMaterial({color: 0x34495e}));
            road.rotation.x = -Math.PI/2;
            group.add(road);

            // ТРОТУАРЫ (Пешеходная часть)
            const createSidewalk = (sideX) => {
                const sw = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 100), new THREE.MeshPhongMaterial({color: 0x95a5a6}));
                sw.position.set(sideX, 0.25, 0);
                group.add(sw);
                
                // Бордюр (Разделение)
                const curb = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 100), new THREE.MeshPhongMaterial({color: 0xffffff}));
                curb.position.set(sideX > 0 ? sideX - 5 : sideX + 5, 0.4, 0);
                group.add(curb);
            };

            createSidewalk(20); // Справа
            createSidewalk(-20); // Слева

            // Здания вдоль тротуаров
            for(let i = -40; i <= 40; i += 30) {
                const h = 20 + Math.random() * 50;
                const bGeo = new THREE.BoxGeometry(15, h, 20);
                const bMat = new THREE.MeshPhongMaterial({color: 0x7f8c8d});
                const build = new THREE.Mesh(bGeo, bMat);
                build.position.set(35, h/2, i);
                group.add(build);

                const buildL = new THREE.Mesh(bGeo, new THREE.MeshPhongMaterial({color: 0x5d6d7e}));
                buildL.position.set(-35, h/2, i);
                group.add(buildL);
            }

            group.position.set(xOffset, 0, zOffset);
            scene.add(group);
        }

        // Создаем сетку кварталов
        for(let z = -CITY_LIMIT/2 + 50; z < CITY_LIMIT/2; z += 100) {
            createDistrict(0, z);
        }

        // --- 3. ИГРОК ---
        const player = new THREE.Group();
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 6), new THREE.MeshPhongMaterial({color: 0x0a0a0a}));
        carBody.position.y = 0.75;
        player.add(carBody);
        
        // Свет фар
        const headL = new THREE.SpotLight(0xffffff, 10);
        headL.position.set(0, 1, -3);
        headL.target.position.set(0, 0, -10);
        player.add(headL);
        player.add(headL.target);

        scene.add(player);

        // --- 4. УПРАВЛЕНИЕ ---
        let mZ = 0, mX = 0;
        const joy = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left:'65px', bottom:'65px'}, color:'white'});
        
        joy.on('move', (e, d) => {
            mZ = -d.vector.y * 0.7;
            mX = -d.vector.x * 0.08;
        });
        joy.on('end', () => { mZ = 0; mX = 0; });

        window.togglePhone = () => document.getElementById('phone').classList.toggle('active');
        window.app = (type) => {
            const scr = document.getElementById('display-screen');
            const apps = {
                guns: "> АРСЕНАЛ: Доступен ТТ-33 и АК-47. Требуется разрешение партии.",
                contacts: "> КОНТАКТЫ: 1. Майор Пак (МВД)\n2. Тётя из столовой\n3. Комитет бдительности.",
                chat: "> КЫМСУСАН: Сообщение от Лидера: 'Работай усерднее!'",
                garage: "> ГАРАЖ: Черный лимузин готов к выезду.",
                maps: "> КАРТЫ: Проспект Рёнмён. Впереди блокпост.",
                bank: "> БАНК: На счету 4500 вон. Лимит на рис: исчерпан."
            };
            scr.innerHTML = apps[type] || "> Ошибка...";
            scr.scrollTop = scr.scrollHeight;
        };

        function animate() {
            requestAnimationFrame(animate);
            player.translateZ(mZ);
            player.rotation.y += mX;

            // Ограничения
            const lim = CITY_LIMIT/2 - 10;
            player.position.x = Math.max(-lim, Math.min(lim, player.position.x));
            player.position.z = Math.max(-lim, Math.min(lim, player.position.z));

            // Камера за игроком
            const offset = new THREE.Vector3(0, 15, 25).applyQuaternion(player.quaternion);
            camera.position.lerp(player.position.clone().add(offset), 0.1);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
