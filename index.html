<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPRK: Open World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px #000; }
        #phone-btn { position: absolute; bottom: 25px; right: 25px; width: 70px; height: 70px; background: #c0392b; border-radius: 50%; border: 3px solid #fff; z-index: 20; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        #phone { position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 90%; height: 60%; background: #111; border-radius: 30px 30px 0 0; transition: 0.4s; z-index: 30; padding: 20px; color: #fff; border: 2px solid #333; }
        #phone.active { bottom: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 10px; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 20; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold;">ПХЕНЬЯН: ОТКРЫТЫЙ МИР</div>
        <div id="coords">Район: Мансудэ</div>
    </div>

    <div id="joystick-zone"></div>
    <div id="phone-btn" onclick="togglePhone()">📱</div>

    <div id="phone">
        <center><strong>ПХЕНЬЯН-OS</strong></center>
        <div class="grid">
            <button class="btn" onclick="msg('Связь с ЦК...')">📞 Связь</button>
            <button class="btn" onclick="msg('Доставка авто...')">🚗 Гараж</button>
            <button class="btn" onclick="msg('Сонбун: 100')">📊 Статус</button>
            <button class="btn" onclick="togglePhone()">❌ Выход</button>
        </div>
        <div id="console" style="color:#0f0; margin-top:20px; font-size:12px;">> Система готова...</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ИНИЦИАЛИЗАЦИЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x445566);
        // ТУМАН: скрывает обрыв карты
        scene.fog = new THREE.Fog(0x445566, 10, 150); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // --- 2. КАРТА (ГРАНИЦЫ И ГОРОД) ---
        const WORLD_SIZE = 400; // Размер города

        // Земля
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE),
            new THREE.MeshPhongMaterial({ color: 0x222222 })
        );
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // Разные здания
        function createBuilding(x, z) {
            const h = 15 + Math.random() * 40;
            const w = 8 + Math.random() * 7;
            const colors = [0x7f8c8d, 0x95a5a6, 0x566573, 0x2c3e50];
            
            const geo = new THREE.BoxGeometry(w, h, w);
            const mat = new THREE.MeshPhongMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
            const b = new THREE.Mesh(geo, mat);
            b.position.set(x, h/2, z);
            scene.add(b);
        }

        // Заполняем город (кроме дороги)
        for(let i = 0; i < 150; i++) {
            let rx = (Math.random() - 0.5) * WORLD_SIZE;
            let rz = (Math.random() - 0.5) * WORLD_SIZE;
            // Оставляем проезд для дороги в центре
            if (Math.abs(rx) > 15) createBuilding(rx, rz);
        }

        // --- 3. ИГРОК ---
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 5), new THREE.MeshPhongMaterial({color: 0x000000}));
        body.position.y = 0.6;
        car.add(body);
        scene.add(car);

        // --- 4. УПРАВЛЕНИЕ И ГРАНИЦЫ ---
        let moveZ = 0, moveX = 0;
        const joy = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left:'60px', bottom:'60px'}, color:'white'});
        
        joy.on('move', (e, d) => {
            moveZ = -d.vector.y * 0.5;
            moveX = -d.vector.x * 0.07;
        });
        joy.on('end', () => { moveZ = 0; moveX = 0; });

        window.togglePhone = () => document.getElementById('phone').classList.toggle('active');
        window.msg = (t) => document.getElementById('console').innerText = "> " + t;

        function animate() {
            requestAnimationFrame(animate);

            // Движение
            car.translateZ(moveZ);
            car.rotation.y += moveX;

            // ГРАНИЦЫ КАРТЫ: не даем выехать за WORLD_SIZE
            const limit = WORLD_SIZE / 2 - 5;
            if (car.position.x > limit) car.position.x = limit;
            if (car.position.x < -limit) car.position.x = -limit;
            if (car.position.z > limit) car.position.z = limit;
            if (car.position.z < -limit) car.position.z = -limit;

            // Камера
            camera.position.lerp(new THREE.Vector3(car.position.x, 10, car.position.z + 18), 0.1);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
