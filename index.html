<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPRK: City Districts RP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #34495e; touch-action: none; font-family: 'Arial', sans-serif; }
        #hud { position: absolute; top: 15px; left: 15px; color: #fff; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px #000; }
        #phone-btn { position: absolute; bottom: 25px; right: 25px; width: 70px; height: 70px; background: #d35400; border-radius: 50%; border: 3px solid #fff; z-index: 20; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #phone { position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 85%; height: 70%; background: #1a1a1a; border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 30; padding: 25px; color: #fff; border: 2px solid #444; }
        #phone.active { bottom: 0; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .app-item { background: #2c3e50; border: 1px solid #555; color: #fff; padding: 20px; border-radius: 15px; font-size: 14px; text-align: center; font-weight: bold; }
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 20; }
        .stat-line { width: 100px; height: 5px; background: #555; margin-top: 5px; }
        .stat-fill { height: 100%; background: #e74c3c; width: 80%; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-size: 20px; letter-spacing: 1px;"><b>ПХЕНЬЯН RP</b></div>
        <div id="location">Локация: Проспект Победы</div>
        <div class="stat-line"><div class="stat-fill"></div></div>
    </div>

    <div id="joystick-zone"></div>
    <div id="phone-btn" onclick="togglePhone()">📱</div>

    <div id="phone">
        <center>
            <div style="width: 50px; height: 5px; background: #333; border-radius: 10px; margin-bottom: 10px;"></div>
            <strong>ПХЕНЬЯН 2412 - СИСТЕМА</strong>
        </center>
        <div class="app-grid">
            <div class="app-item" onclick="app('report')">📢 ДОНОС</div>
            <div class="app-item" onclick="app('garage')">🚗 ГАРАЖ</div>
            <div class="app-item" onclick="app('market')">🛒 РЫНОК</div>
            <div class="app-item" onclick="app('stats')">📈 РАНГ</div>
        </div>
        <div id="display" style="margin-top: 30px; background: #000; padding: 15px; border-radius: 10px; color: #0f0; font-family: monospace; font-size: 12px; height: 80px; border: 1px solid #333;">
            > Ожидание команд...
        </div>
        <button onclick="togglePhone()" style="width:100%; margin-top:15px; background:transparent; border:1px solid #666; color:#999; padding:10px; border-radius:10px;">ЗАКРЫТЬ</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. НАСТРОЙКИ МИРА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        scene.fog = new THREE.Fog(0x2c3e50, 20, 180);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // --- 2. ГЕНЕРАЦИЯ ГОРОДА (Кварталы) ---
        const CITY_SIZE = 500;
        
        // Главная площадь и дороги
        const groundGeo = new THREE.PlaneGeometry(CITY_SIZE, CITY_SIZE);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Рисуем разметку дорог (сетка)
        for(let i = -CITY_SIZE/2; i <= CITY_SIZE/2; i += 50) {
            const row = new THREE.Mesh(new THREE.PlaneGeometry(CITY_SIZE, 10), new THREE.MeshBasicMaterial({color: 0x333333}));
            row.rotation.x = -Math.PI/2;
            row.position.set(0, 0.01, i);
            scene.add(row);
            
            const col = new THREE.Mesh(new THREE.PlaneGeometry(10, CITY_SIZE), new THREE.MeshBasicMaterial({color: 0x333333}));
            col.rotation.x = -Math.PI/2;
            col.position.set(i, 0.02, 0);
            scene.add(col);
        }

        // Типы зданий
        function addNKBuilding(x, z) {
            const type = Math.random();
            let h, w, color;

            if(type > 0.8) { // Небоскреб
                h = 60 + Math.random()*40; w = 12; color = 0x95a5a6;
            } else if(type > 0.4) { // Хрущевка
                h = 20 + Math.random()*10; w = 20; color = 0x7f8c8d;
            } else { // Административное здание
                h = 15; w = 25; color = 0xbdc3c7;
            }

            const geo = new THREE.BoxGeometry(w, h, w);
            const mat = new THREE.MeshPhongMaterial({ color: color });
            const b = new THREE.Mesh(geo, mat);
            b.position.set(x, h/2, z);
            scene.add(b);

            // Окна
            if(h > 10) {
                const winGeo = new THREE.PlaneGeometry(1, 1.5);
                const winMat = new THREE.MeshBasicMaterial({color: 0xffffcc});
                for(let level = 4; level < h-4; level += 5) {
                    const win = new THREE.Mesh(winGeo, winMat);
                    win.position.set(x + w/2 + 0.1, level, z);
                    win.rotation.y = Math.PI/2;
                    scene.add(win);
                }
            }
        }

        // Заполнение кварталов
        for(let x = -CITY_SIZE/2 + 25; x < CITY_SIZE/2; x += 50) {
            for(let z = -CITY_SIZE/2 + 25; z < CITY_SIZE/2; z += 50) {
                if(Math.abs(x) > 10 && Math.abs(z) > 10) { // Не ставим здания на главные дороги
                    addNKBuilding(x + (Math.random()-0.5)*10, z + (Math.random()-0.5)*10);
                }
            }
        }

        // --- 3. ИГРОК ---
        const player = new THREE.Group();
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 5), new THREE.MeshPhongMaterial({color: 0x050505}));
        carBody.position.y = 0.6;
        player.add(carBody);
        
        // Фары
        const lGeo = new THREE.BoxGeometry(0.6, 0.3, 0.1);
        const lMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        const f1 = new THREE.Mesh(lGeo, lMat); f1.position.set(0.8, 0.6, -2.5);
        const f2 = new THREE.Mesh(lGeo, lMat); f2.position.set(-0.8, 0.6, -2.5);
        player.add(f1, f2);

        scene.add(player);

        // --- 4. ЛОГИКА ---
        let mZ = 0, mX = 0;
        const joy = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white'});
        
        joy.on('move', (e, d) => {
            mZ = -d.vector.y * 0.6;
            mX = -d.vector.x * 0.08;
        });
        joy.on('end', () => { mZ = 0; mX = 0; });

        window.togglePhone = () => document.getElementById('phone').classList.toggle('active');
        window.app = (n) => {
            const d = document.getElementById('display');
            if(n === 'report') d.innerText = "> СООБЩЕНИЕ: Сосед слушает K-POP. Группе захвата выехать.";
            if(n === 'garage') d.innerText = "> ГАРАЖ: Ваш лимузин подан к подъезду.";
            if(n === 'market') d.innerText = "> РЫНОК: Рис в наличии (1кг за 500 вон).";
            if(n === 'stats') d.innerText = "> СТАТУС: Лояльность 100%. Вы примерный гражданин.";
        };

        function animate() {
            requestAnimationFrame(animate);
            player.translateZ(mZ);
            player.rotation.y += mX;

            // Ограничение карты
            const lim = CITY_SIZE/2 - 10;
            player.position.x = Math.max(-lim, Math.min(lim, player.position.x));
            player.position.z = Math.max(-lim, Math.min(lim, player.position.z));

            // Камера
            const goal = new THREE.Vector3(player.position.x, 12, player.position.z + 20);
            camera.position.lerp(goal, 0.1);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
