<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPRK Mobile RP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        
        /* HUD для мобилок */
        #hud { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; }
        .bar { width: 120px; height: 8px; background: rgba(0,0,0,0.5); border: 1px solid #fff; }
        .fill { height: 100%; background: #44ff44; width: 100%; }

        /* Кнопка вызова телефона */
        #phone-btn { 
            position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; 
            background: #cc0000; border-radius: 50%; border: 2px solid #fff; color: white;
            font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 20;
        }

        /* Сам телефон */
        #phone { 
            position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 80%; height: 70%; background: #1a1a1a; border: 3px solid #333; 
            border-radius: 30px 30px 0 0; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30; padding: 20px; box-sizing: border-box; color: #fff;
        }
        #phone.active { bottom: 0; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .app-btn { background: #333; border: none; color: white; padding: 15px; border-radius: 10px; font-size: 14px; }

        /* Зона джойстика */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 20; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="status">Сонбун: 100 | Ранг: Рабочий</div>
        <div class="bar"><div class="fill"></div></div>
    </div>

    <div id="joystick-zone"></div>

    <div id="phone-btn" onclick="togglePhone()">📱</div>

    <div id="phone">
        <div style="width: 40px; height: 40px; background: #555; margin: 0 auto 10px; border-radius: 50%;"></div>
        <center><strong>ПХЕНЬЯН-OS</strong></center>
        <div class="app-grid">
            <button class="app-btn" onclick="action('car')">🚗 Вызвать авто</button>
            <button class="app-btn" onclick="action('weapon')">🔫 Оружие</button>
            <button class="app-btn" onclick="action('faction')">👥 Фракция</button>
            <button class="app-btn" onclick="togglePhone()" style="background: #aa0000;">❌ Закрыть</button>
        </div>
        <div id="logs" style="margin-top: 20px; font-size: 12px; color: #0f0;">Ожидание приказов...</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- НАСТРОЙКИ МИРА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Дорога
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({color: 0x444444}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // Машина игрока
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshPhongMaterial({color: 0x111111}));
        body.position.y = 0.5;
        car.add(body);
        scene.add(car);

        camera.position.set(0, 8, 12);

        // --- МОБИЛЬНОЕ УПРАВЛЕНИЕ (ДЖОЙСТИК) ---
        let moveX = 0;
        let moveZ = 0;

        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white'
        });

        joystick.on('move', (evt, data) => {
            const forward = data.vector.y;
            const turn = data.vector.x;
            moveZ = -forward * 0.2; // Скорость вперед
            moveX = -turn * 0.05;   // Скорость поворота
        });

        joystick.on('end', () => {
            moveX = 0;
            moveZ = 0;
        });

        // --- ЛОГИКА ТЕЛЕФОНА ---
        window.togglePhone = () => {
            document.getElementById('phone').classList.toggle('active');
        };

        window.action = (type) => {
            const logs = document.getElementById('logs');
            if(type === 'car') logs.innerText = "> Авто доставлено к заводу";
            if(type === 'weapon') logs.innerText = "> Доступ запрещен. Сонбун слишком низкий";
            if(type === 'faction') logs.innerText = "> Запрос в ЦК отправлен...";
        };

        // --- ЦИКЛ ИГРЫ ---
        function animate() {
            requestAnimationFrame(animate);

            // Движение машины
            car.translateZ(moveZ);
            car.rotation.y += moveX;

            // Камера плавно следует за авто
            camera.position.lerp(new THREE.Vector3(car.position.x, 10, car.position.z + 15), 0.1);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }

        animate();

        // Адаптация экрана
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
