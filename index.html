<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pyongyang 3D Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Симулятор Пхеньяна 3D</h1>
        <p>Статус: Гражданин</p>
        <p>Клавиши: Церемониальный проезд кортежа...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Сцена и Камера
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Голубое небо
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Свет
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. Дорога
        const roadGeo = new THREE.PlaneGeometry(20, 1000);
        const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Вспомогательная функция для создания машин
        function createCar(color, zPos, xPos, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.8, 3),
                new THREE.MeshPhongMaterial({ color: color })
            );
            body.position.y = 0.4;
            group.add(body);
            group.position.set(xPos, 0, zPos);
            scene.add(group);
            return group;
        }

        // 4. Объекты
        const presidentCar = createCar(0xffd700, -20, 2, "Президент"); // Золотой лимузин
        const policeCar = createCar(0x0000ff, 10, -2, "Полиция");   // Синяя полиция
        
        // Декорации (простые дома)
        for(let i = 0; i < 10; i++) {
            const building = new THREE.Mesh(
                new THREE.BoxGeometry(5, 15, 5),
                new THREE.MeshPhongMaterial({ color: 0xaaaaaa })
            );
            building.position.set(15, 7.5, -i * 30);
            scene.add(building);
        }

        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, -20);

        // 5. Анимация
        function animate() {
            requestAnimationFrame(animate);

            // Движение машин
            presidentCar.position.z -= 0.1;
            policeCar.position.z -= 0.05;

            // Камера следует за кортежем (опционально)
            camera.position.z = presidentCar.position.z + 15;
            camera.lookAt(0, 0, presidentCar.position.z - 10);

            renderer.render(scene, camera);
        }

        animate();

        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
