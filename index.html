<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPRK: Mercedes Drive v8.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 15px; left: 15px; color: #fff; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #phone-btn { position: absolute; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #c0392b; border-radius: 50%; border: 3px solid #fff; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        #fire-btn { position: absolute; bottom: 110px; right: 20px; width: 75px; height: 75px; background: rgba(231, 76, 60, 0.8); border-radius: 50%; border: 3px solid #fff; z-index: 90; display: none; align-items: center; justify-content: center; font-size: 30px; }
        #exit-btn { position: absolute; bottom: 110px; left: 20px; padding: 15px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #fff; border-radius: 10px; display: none; z-index: 90; font-weight: bold; }

        /* ИНТЕРФЕЙС ТЕЛЕФОНА */
        #phone { position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 95%; height: 85%; background: #0a0a0a; border-radius: 35px 35px 0 0; transition: 0.4s; z-index: 200; padding: 15px; border: 2px solid #333; box-sizing: border-box; }
        #phone.active { bottom: 0; }
        #phone-display { background: #111; height: 100%; border-radius: 20px; padding: 15px; color: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .app-page { display: none; flex-direction: column; height: 100%; }
        .app-page.active { display: flex; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .app-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; text-align: center; }
        .icon-sq { width: 55px; height: 55px; background: #222; border-radius: 14px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 1px solid #444; }
        
        #chat-content { flex-grow: 1; background: #000; border-radius: 10px; padding: 10px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; }
        #chat-input-row { display: flex; gap: 5px; }
        #chat-input { flex-grow: 1; background: #222; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 5px; }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 50; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="status-text"><b>РЕЖИМ: ПЕШЕХОД</b></div>
        <div id="weapon-name" style="color: #e74c3c; font-weight: bold;"></div>
    </div>

    <div id="joystick-zone"></div>
    <div id="fire-btn">💥</div>
    <div id="exit-btn" onclick="exitVehicle()">ВЫЙТИ</div>
    <div id="phone-btn" onclick="togglePhone()">📱</div>

    <div id="phone">
        <div id="phone-display">
            <div id="p-main" class="app-page active">
                <center><h4 style="color:#c0392b; margin:0 0 10px 0;">KORYO v8.7</h4></center>
                <div class="app-grid">
                    <div class="app-item" onclick="openApp('ars')"><div class="icon-sq">🔫</div>Арсенал</div>
                    <div class="app-item" onclick="openApp('msg')"><div class="icon-sq">💬</div>Чат</div>
                    <div class="app-item" onclick="openApp('calls')"><div class="icon-sq">📞</div>Звонки</div>
                    <div class="app-item" onclick="openApp('cont')"><div class="icon-sq">👤</div>Контакты</div>
                    <div class="app-item" onclick="togglePhone()"><div class="icon-sq" style="background:#c0392b;">🚪</div>ВЫХОД</div>
                </div>
            </div>
            <div id="p-msg" class="app-page">
                <button onclick="openApp('main')">←</button>
                <div id="chat-content"></div>
                <div id="chat-input-row">
                    <input type="text" id="chat-input">
                    <button onclick="sendMessage()">▶</button>
                </div>
            </div>
            <div id="p-ars" class="app-page">
                <button onclick="openApp('main')">←</button>
                <div style="margin-top:10px;">
                    <button onclick="takeWeapon('M4A1')" style="width:100%; margin-bottom:5px;">M4A1 Desert</button>
                    <button onclick="takeWeapon('Deagle')" style="width:100%; margin-bottom:5px;">Desert Eagle</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ИНИЦИАЛИЗАЦИЯ
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x1a1a1a}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // ГОРОД
        for(let i = -10; i < 10; i++) {
            const h = 20 + Math.random()*20;
            const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 20), new THREE.MeshPhongMaterial({color: 0x7f8c8d}));
            b.position.set(35, h/2, i*45);
            scene.add(b);
            const bl = b.clone(); bl.position.x = -35; scene.add(bl);
        }

        // ТРАФИК
        const traffic = [];
        for(let i=0; i<6; i++) {
            const tc = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 4), new THREE.MeshPhongMaterial({color: 0x000000}));
            tc.position.set(Math.random()>0.5?6:-6, 0.6, -i*60);
            scene.add(tc); traffic.push(tc);
        }

        // --- МАШИНА ИГРОКА (МЕРСЕДЕС) ---
        const car = new THREE.Group();
        const carPhysicsBody = new THREE.Mesh(
            new THREE.BoxGeometry(3, 1.3, 6),
            new THREE.MeshPhongMaterial({color: 0xff0000, transparent: true, opacity: 0}) // Невидимый куб
        );
        carPhysicsBody.position.y = 0.65;
        car.add(carPhysicsBody);
        car.position.set(0, 0, -15);
        scene.add(car);

        // ЗАГРУЗКА ВАШЕЙ МОДЕЛИ
        const loader = new GLTFLoader();
        loader.load('mercedes-benz_cls_63_amg.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(1.5, 1.5, 1.5); // Масштаб
            model.rotation.y = Math.PI;    // Поворот на 180 (лицом вперед)
            model.position.y = -0.6;       // Посадка на дорогу
            car.add(model);                // Привязываем модель к контейнеру car
            console.log("Mercedes загружен!");
        }, undefined, (e) => console.error("Файл модели не найден!"));

        // ИГРОК
        const player = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1), new THREE.MeshPhongMaterial({color: 0x3498db}));
        pBody.position.y = 1; player.add(pBody);
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.8), new THREE.MeshPhongMaterial({color: 0x222222}));
        gun.position.set(0.6, 1.2, -0.5); gun.visible = false; player.add(gun);
        scene.add(player);

        // УПРАВЛЕНИЕ
        let mZ = 0, mX = 0, isDriving = false, currentWeapon = null;
        const joy = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left:'60px', bottom:'60px'}, color:'white'});
        joy.on('move', (e, d) => { mZ = -d.vector.y * 0.6; mX = -d.vector.x * 0.08; });
        joy.on('end', () => { mZ = 0; mX = 0; });

        // ФУНКЦИИ ТЕЛЕФОНА
        window.togglePhone = () => document.getElementById('phone').classList.toggle('active');
        window.openApp = (id) => {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
        };
        window.sendMessage = () => {
            const inp = document.getElementById('chat-input');
            const cont = document.getElementById('chat-content');
            if(inp.value) { cont.innerHTML += `<div><b>Вы:</b> ${inp.value}</div>`; inp.value = ""; }
        };
        window.takeWeapon = (type) => {
            currentWeapon = type; gun.visible = !!type;
            document.getElementById('weapon-name').innerText = type ? "ОРУЖИЕ: "+type : "";
            document.getElementById('fire-btn').style.display = type ? "flex" : "none";
            togglePhone();
        };

        // СТРЕЛЬБА
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position); b.position.y = 1.2; scene.add(b);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion);
            function f() { b.position.add(dir.clone().multiplyScalar(2)); if(b.position.distanceTo(player.position)<80) requestAnimationFrame(f); else scene.remove(b); } f();
        });

        window.exitVehicle = () => {
            isDriving = false; player.visible = true;
            player.position.set(car.position.x + 5, 0, car.position.z);
            document.getElementById('exit-btn').style.display = "none";
            document.getElementById('status-text').innerText = "РЕЖИМ: ПЕШЕХОД";
        };

        function animate() {
            requestAnimationFrame(animate);
            if(isDriving) {
                car.translateZ(mZ); car.rotation.y += mX; player.position.copy(car.position);
            } else {
                player.translateZ(mZ); player.rotation.y += mX;
                if(player.position.distanceTo(car.position) < 5) {
                    isDriving = true; player.visible = false;
                    document.getElementById('exit-btn').style.display = "block";
                    document.getElementById('status-text').innerText = "РЕЖИМ: В МАШИНЕ";
                }
            }
            // Движение трафика
            traffic.forEach(t => { t.position.z += 0.3; if(t.position.z > 200) t.position.z = -400; });

            const off = new THREE.Vector3(0, 15, 25).applyQuaternion(isDriving ? car.quaternion : player.quaternion);
            camera.position.lerp(player.position.clone().add(off), 0.1); camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
