<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPRK: Soldier of Juche v7.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 15px; left: 15px; color: #fff; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        
        /* Кнопки управления */
        #phone-btn { position: absolute; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #c0392b; border-radius: 50%; border: 3px solid #fff; z-index: 20; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        #fire-btn { position: absolute; bottom: 110px; right: 20px; width: 70px; height: 70px; background: rgba(231, 76, 60, 0.7); border-radius: 50%; border: 2px solid #fff; z-index: 20; display: none; align-items: center; justify-content: center; font-size: 30px; color: white; }
        #exit-btn { position: absolute; bottom: 110px; left: 20px; padding: 15px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #fff; border-radius: 10px; display: none; z-index: 10; }

        /* ТЕЛЕФОН */
        #phone { position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 95%; height: 85%; background: #0a0a0a; border-radius: 30px 30px 0 0; transition: 0.4s; z-index: 30; padding: 15px; border: 2px solid #333; box-sizing: border-box; }
        #phone.active { bottom: 0; }
        #phone-display { background: #111; height: 100%; border-radius: 15px; padding: 10px; overflow-y: auto; color: #fff; display: flex; flex-direction: column; }

        .app-page { display: none; flex-direction: column; height: 100%; }
        .app-page.active { display: flex; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-sq { width: 50px; height: 50px; background: #222; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #444; }
        
        .list-item { background: #1c1c1c; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #333; display: flex; justify-content: space-between; }
        .back-btn { background: none; border: none; color: #555; text-align: left; padding: 5px; cursor: pointer; }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 20; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-size: 10px; opacity: 0.6;">KORYOLINK 5G</div>
        <div id="status-text"><b>ПЕШЕХОД</b></div>
        <div id="weapon-name" style="color: #e74c3c; font-weight: bold;"></div>
    </div>

    <div id="joystick-zone"></div>
    <div id="fire-btn">💥</div>
    <div id="exit-btn" onclick="exitVehicle()">ВЫЙТИ ИЗ МАШИНЫ</div>
    <div id="phone-btn" onclick="togglePhone()">📱</div>

    <div id="phone">
        <div id="phone-display">
            <div id="p-main" class="app-page active">
                <center><h4 style="color:#c0392b">ПХЕНЬЯН OS</h4></center>
                <div class="app-grid">
                    <div class="app-item" onclick="openApp('ars')"><div class="icon-sq">🔫</div>Арсенал</div>
                    <div class="app-item" onclick="openApp('msg')"><div class="icon-sq">💬</div>Чат</div>
                    <div class="app-item" onclick="openApp('calls')"><div class="icon-sq">📞</div>Звонки</div>
                    <div class="app-item" onclick="openApp('cont')"><div class="icon-sq">👤</div>Контакты</div>
                    <div class="app-item" onclick="openApp('car')"><div class="icon-sq">🚗</div>Машина</div>
                </div>
            </div>

            <div id="p-ars" class="app-page">
                <button class="back-btn" onclick="openApp('main')">← Назад</button>
                <div class="list-item"><span>M4A1 Desert</span><button onclick="takeWeapon('M4A1')">ВЗЯТЬ</button></div>
                <div class="list-item"><span>Desert Eagle</span><button onclick="takeWeapon('Deagle')">ВЗЯТЬ</button></div>
                <div class="list-item"><span>Снять всё</span><button onclick="takeWeapon(null)">УБРАТЬ</button></div>
            </div>

            <div id="p-calls" class="app-page">
                <button class="back-btn" onclick="openApp('main')">← Назад</button>
                <center style="margin-top:50px;">
                    <div class="icon-sq" style="width:80px; height:80px; font-size:40px;">📞</div>
                    <p>Набор номера...</p>
                </center>
            </div>

            <div id="p-cont" class="app-page">
                <button class="back-btn" onclick="openApp('main')">← Назад</button>
                <div class="list-item">👤 Майор Пак</div>
                <div class="list-item">👤 Штаб МВД</div>
                <div class="list-item">👤 Комендант</div>
            </div>
            
            <div id="p-msg" class="app-page">
                <button class="back-btn" onclick="openApp('main')">← Назад</button>
                <div style="flex-grow:1; background:#000; margin:10px 0; border-radius:10px; padding:10px; font-size:12px;">
                    [СИСТЕМА]: Добро пожаловать в мессенджер Кымсусан.
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // Земля и здания
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x1a1a1a}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        for(let i = -10; i < 10; i++) {
            const h = 20 + Math.random()*40;
            const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 20), new THREE.MeshPhongMaterial({color: 0x7f8c8d}));
            b.position.set(35, h/2, i*40);
            scene.add(b);
            const bl = b.clone(); bl.position.x = -35; scene.add(bl);
        }

        // Игрок и Машина
        let isDriving = false;
        let currentWeapon = null;

        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshPhongMaterial({color: 0x3498db}));
        body.position.y = 1;
        player.add(body);

        // Модель оружия в руке
        const gunModel = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 1), new THREE.MeshPhongMaterial({color: 0x222222}));
        gunModel.position.set(0.6, 1.2, -0.5);
        gunModel.visible = false;
        player.add(gunModel);
        scene.add(player);

        const car = new THREE.Group();
        const cBody = new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 6), new THREE.MeshPhongMaterial({color: 0x050505}));
        cBody.position.set(0, 0.6, -10);
        car.add(cBody);
        scene.add(car);

        // Управление
        let mZ = 0, mX = 0;
        const joy = nipplejs.create({zone: document.getElementById('joystick-zone'), mode: 'static', position: {left:'60px', bottom:'60px'}, color:'white'});
        joy.on('move', (e, d) => { mZ = -d.vector.y * 0.6; mX = -d.vector.x * 0.08; });
        joy.on('end', () => { mZ = 0; mX = 0; });

        // Функции телефона
        window.togglePhone = () => document.getElementById('phone').classList.toggle('active');
        window.openApp = (id) => {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
        };

        // ВЗЯТЬ ОРУЖИЕ
        window.takeWeapon = (type) => {
            currentWeapon = type;
            gunModel.visible = !!type;
            document.getElementById('weapon-name').innerText = type ? "ОРУЖИЕ: " + type : "";
            document.getElementById('fire-btn').style.display = type ? "flex" : "none";
            togglePhone();
        };

        // СТРЕЛЬБА
        document.getElementById('fire-btn').addEventListener('touchstart', () => {
            if(!currentWeapon) return;
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
            bullet.position.copy(player.position);
            bullet.position.y = 1.2;
            scene.add(bullet);
            
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            const speed = 2;
            function moveBullet() {
                bullet.position.add(dir.clone().multiplyScalar(speed));
                if(bullet.position.distanceTo(player.position) < 100) requestAnimationFrame(moveBullet);
                else scene.remove(bullet);
            }
            moveBullet();
        });

        window.exitVehicle = () => {
            isDriving = false; player.visible = true;
            player.position.set(car.position.x + 5, 0, car.position.z);
            document.getElementById('exit-btn').style.display = "none";
            document.getElementById('status-text').innerText = "ПЕШЕХОД";
        };

        function animate() {
            requestAnimationFrame(animate);

            // Фикс поворота экрана
            if (renderer.domElement.width !== window.innerWidth || renderer.domElement.height !== window.innerHeight) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            if(isDriving) {
                car.translateZ(mZ); car.rotation.y += mX;
                player.position.copy(car.position);
            } else {
                player.translateZ(mZ); player.rotation.y += mX;
                const dist = player.position.distanceTo(car.children[0].getWorldPosition(new THREE.Vector3()));
                if(dist < 5) {
                    isDriving = true; player.visible = false;
                    document.getElementById('exit-btn').style.display = "block";
                    document.getElementById('status-text').innerText = "В МАШИНЕ";
                }
            }

            const off = new THREE.Vector3(0, 15, 25).applyQuaternion(isDriving ? car.quaternion : player.quaternion);
            camera.position.lerp(player.position.clone().add(off), 0.1);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
